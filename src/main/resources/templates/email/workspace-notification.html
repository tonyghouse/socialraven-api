<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Workspace notification</title>
</head>
<body style="margin:0;padding:0;background-color:#F7F8F9;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#172B4D;">
<div style="display:none;max-height:0;overflow:hidden;opacity:0;" th:text="${preheader}">Workspace notification.</div>
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F7F8F9;padding:32px 16px;">
    <tr>
        <td align="center">
            <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:600px;">
                <tr>
                    <td style="padding:0 0 16px 0;">
                        <div style="display:inline-block;padding:6px 10px;border-radius:999px;background-color:#DEEBFF;color:#0C66E4;font-size:12px;font-weight:700;letter-spacing:0.02em;" th:text="${productName}">SocialRaven</div>
                    </td>
                </tr>
                <tr>
                    <td style="background-color:#FFFFFF;border:1px solid #DFE1E6;border-radius:16px;padding:32px;">
                        <p style="margin:0 0 12px 0;font-size:12px;line-height:16px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:#44546F;" th:text="${eyebrow}">Workspace update</p>
                        <h1 style="margin:0 0 12px 0;font-size:28px;line-height:34px;font-weight:700;color:#172B4D;" th:text="${title}">Workspace notification</h1>
                        <p style="margin:0 0 24px 0;font-size:16px;line-height:24px;color:#44546F;" th:text="${intro}">Your workspace details were updated.</p>

                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 24px 0;border:1px solid #DFE1E6;border-radius:12px;background-color:#FFFFFF;">
                            <tr th:each="detail, stat : ${details}">
                                <td th:style="${stat.last} ? 'padding:18px 20px;' : 'padding:18px 20px;border-bottom:1px solid #EBECF0;'">
                                    <p style="margin:0 0 6px 0;font-size:12px;line-height:16px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:#44546F;" th:text="${detail['label']}">Label</p>
                                    <p style="margin:0;font-size:16px;line-height:24px;color:#172B4D;" th:text="${detail['value']}">Value</p>
                                </td>
                            </tr>
                        </table>

                        <div style="margin:0 0 24px 0;padding:16px 18px;border-radius:12px;background-color:#F1F2F4;border:1px solid #DFE1E6;">
                            <p style="margin:0 0 8px 0;font-size:12px;line-height:16px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:#44546F;" th:text="${panelLabel}">Status</p>
                            <p style="margin:0;font-size:14px;line-height:21px;color:#44546F;" th:text="${footerMessage}">Review this update in SocialRaven if needed.</p>
                        </div>

                        <a th:if="${actionLabel != null and actionUrl != null}" th:href="${actionUrl}" style="display:inline-block;padding:12px 20px;border-radius:10px;background-color:#0C66E4;color:#FFFFFF;text-decoration:none;font-size:15px;line-height:20px;font-weight:700;" th:text="${actionLabel}">Open SocialRaven</a>
                    </td>
                </tr>
                <tr>
                    <td style="padding:16px 4px 0 4px;">
                        <p style="margin:0;font-size:12px;line-height:18px;color:#6B778C;">
                            Account and workspace notifications from
                            <a th:href="${supportUrl}" style="color:#0C66E4;text-decoration:underline;" th:text="${productName}">SocialRaven</a>.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
